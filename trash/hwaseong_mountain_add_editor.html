<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>화성시 산 좌표 추가 편집기</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
  <style>
    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", "Malgun Gothic", Arial, sans-serif;
    }

    .mountain-editor-panel {
      position: absolute;
      z-index: 1000;
      top: 12px;
      left: 12px;
      display: grid;
      gap: 8px;
      width: min(380px, calc(100vw - 24px));
      padding: 10px;
      border: 1px solid rgba(24, 38, 30, .18);
      border-radius: 7px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 8px 24px rgba(16, 24, 20, .18);
      color: #1f2a22;
      font-size: 12px;
      line-height: 1.35;
    }

    .mountain-editor-panel h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 850;
      letter-spacing: 0;
    }

    .mountain-editor-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .mountain-editor-stat {
      padding: 6px 7px;
      border: 1px solid rgba(48, 70, 54, .13);
      border-radius: 6px;
      background: #f8faf7;
    }

    .mountain-editor-stat strong {
      display: block;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mountain-editor-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .mountain-editor-actions button,
    .mountain-editor-actions label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 8px;
      border: 1px solid rgba(31, 47, 38, .2);
      border-radius: 6px;
      background: #ffffff;
      color: #1f2a22;
      font: inherit;
      font-weight: 780;
      cursor: pointer;
      white-space: nowrap;
    }

    .mountain-editor-actions button:hover,
    .mountain-editor-actions label:hover {
      background: #f0f6f1;
    }

    .mountain-editor-actions .primary {
      border-color: rgba(34, 112, 63, .45);
      background: #22703f;
      color: #ffffff;
    }

    .mountain-editor-actions .danger {
      border-color: rgba(190, 24, 24, .32);
      color: #b91c1c;
    }

    .mountain-editor-actions input {
      display: none;
    }

    .mountain-editor-status {
      min-height: 17px;
      color: #56675c;
    }

    .mountain-list-section {
      display: grid;
      gap: 5px;
    }

    .mountain-list-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0;
      color: #2f4035;
      font-size: 12px;
      font-weight: 850;
    }

    .mountain-list-title span {
      color: #66766b;
      font-size: 11px;
      font-weight: 750;
    }

    .mountain-list {
      display: grid;
      gap: 5px;
      max-height: min(26vh, 230px);
      overflow: auto;
      padding: 6px;
      border: 1px solid rgba(48, 70, 54, .13);
      border-radius: 6px;
      background: #f8faf7;
    }

    .mountain-list:empty {
      display: none;
    }

    .mountain-list button {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      width: 100%;
      min-height: 34px;
      padding: 6px 7px;
      border: 1px solid transparent;
      border-radius: 5px;
      background: #ffffff;
      color: #1f2a22;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .mountain-list button:hover,
    .mountain-list button.is-active {
      border-color: rgba(34, 112, 63, .38);
      background: #e8f4ea;
    }

    .mountain-list strong,
    .mountain-list span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mountain-list small {
      grid-column: 1 / -1;
      color: #65746a;
      font-size: 11px;
    }

    .existing-mountain-list button {
      background: #fbfcfa;
    }

    .existing-mountain-list button:hover,
    .existing-mountain-list button.is-active {
      border-color: rgba(76, 105, 82, .32);
      background: #eef5ef;
    }

    .existing-mountain-icon {
      background: transparent;
      border: 0;
    }

    .existing-mountain-label {
      transform: translate(-50%, -50%);
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border: 2px solid rgba(76, 105, 82, .42);
      border-radius: 6px;
      background: rgba(255, 255, 255, .88);
      box-shadow: 0 2px 8px rgba(0, 0, 0, .2);
      color: #26362a;
      font: 850 15px/1.1 "Segoe UI", "Malgun Gothic", Arial, sans-serif;
      white-space: nowrap;
      text-shadow: 0 1px 0 #fff;
    }

    .existing-mountain-label small {
      color: #66766b;
      font-size: 10px;
      font-weight: 800;
    }

    .manual-mountain-icon {
      background: transparent;
      border: 0;
    }

    .manual-mountain-label {
      transform: translate(-50%, -50%);
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 9px;
      border: 2px solid rgba(34, 112, 63, .52);
      border-radius: 6px;
      background: rgba(255, 255, 255, .93);
      box-shadow: 0 2px 10px rgba(0, 0, 0, .24);
      color: #172317;
      font: 900 18px/1.1 "Segoe UI", "Malgun Gothic", Arial, sans-serif;
      white-space: nowrap;
      text-shadow: 0 1px 0 #fff;
    }

    .manual-mountain-label small {
      color: #4f624f;
      font-size: 11px;
      font-weight: 850;
    }

    .mountain-popup-form {
      display: grid;
      gap: 8px;
      min-width: 220px;
      font: 12px/1.35 "Segoe UI", "Malgun Gothic", Arial, sans-serif;
    }

    .mountain-popup-form label {
      display: grid;
      gap: 4px;
      color: #314138;
      font-weight: 780;
    }

    .mountain-popup-form input {
      width: 100%;
      box-sizing: border-box;
      min-height: 30px;
      border: 1px solid rgba(31, 47, 38, .22);
      border-radius: 5px;
      padding: 4px 7px;
      font: inherit;
    }

    .mountain-popup-coords {
      color: #637267;
      font-size: 11px;
    }

    .mountain-popup-table {
      border-collapse: collapse;
      min-width: 210px;
      font: 12px/1.4 "Segoe UI", "Malgun Gothic", Arial, sans-serif;
    }

    .mountain-popup-table th,
    .mountain-popup-table td {
      padding: 3px 7px 3px 0;
      text-align: left;
      vertical-align: top;
    }

    .mountain-popup-table th {
      color: #526257;
      white-space: nowrap;
    }

    .mountain-popup-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .mountain-popup-actions button {
      min-height: 30px;
      border: 1px solid rgba(31, 47, 38, .22);
      border-radius: 5px;
      background: #ffffff;
      color: #1f2a22;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .mountain-popup-actions .primary {
      border-color: rgba(34, 112, 63, .45);
      background: #22703f;
      color: #ffffff;
    }

    .mountain-popup-actions .danger {
      color: #b91c1c;
    }

    @media (max-width: 560px) {
      .mountain-editor-panel {
        top: 8px;
        left: 8px;
        width: calc(100vw - 16px);
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <section class="mountain-editor-panel" aria-label="산 좌표 추가 편집기">
    <h1>화성시 산 좌표 추가</h1>
    <div class="mountain-editor-stats">
      <div class="mountain-editor-stat"><span>기존 산</span><strong id="existing-mountain-count">-</strong></div>
      <div class="mountain-editor-stat"><span>추가 산</span><strong id="mountain-count">0</strong></div>
      <div class="mountain-editor-stat"><span>선택 좌표</span><strong id="selected-coord">-</strong></div>
    </div>
    <div class="mountain-editor-actions">
      <button type="button" class="primary" id="export-btn">내보내기</button>
      <label for="import-input">불러오기<input id="import-input" type="file" accept="application/json,.json" /></label>
      <button type="button" class="danger" id="clear-btn">초기화</button>
    </div>
    <div class="mountain-list-section">
      <p class="mountain-list-title">기존 산 목록 <span>읽기 전용</span></p>
      <div class="mountain-list existing-mountain-list" id="existing-mountain-list" aria-label="기존 산 목록"></div>
    </div>
    <div class="mountain-list-section">
      <p class="mountain-list-title">추가 산 목록 <span>내보내기 대상</span></p>
      <div class="mountain-list" id="mountain-list" aria-label="추가 산 목록"></div>
    </div>
    <div class="mountain-editor-status" id="status">지도에서 위치를 선택하세요</div>
  </section>
  <script src="hwaseong_mountain_add_editor.js?v=20260622-mountain-add-editor" charset="utf-8"></script>
</body>
</html>
